<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
    
    <div class="container">
        <header>
            <h1>AI 동물상 테스트</h1>
            <p class="subtitle">나의 얼굴은 강아지상일까, 고양이상일까?</p>
        </header>

        <div class="test-area">
            <div id="image-upload-container">
                <label for="image-input" class="upload-label">
                    <span class="upload-icon">📸</span>
                    <span class="upload-text">사진을 업로드하거나 드래그하세요</span>
                </label>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
                <img id="image-preview" src="" alt="미리보기" style="display: none;">
            </div>
            <div id="label-container"></div>
        </div>

        <div class="divider"></div>

        <section class="inquiry-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mgornywd" method="POST" id="inquiry-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="이름" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="이메일" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="협업 제안 내용을 적어주세요." rows="4" required></textarea>
                </div>
                <button type="submit" class="submit-btn">메시지 보내기</button>
            </form>
        </section>

        <div class="divider"></div>

        <section class="comments-section">
            <div id="disqus_thread"></div>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
